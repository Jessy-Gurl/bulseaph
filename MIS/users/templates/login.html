{% extends 'homepage_base.html' %}
{% load static %}

{% block title %}LOGIN PAGE{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<div class="container">
    <div class="login_container">
        <div class="login_title">
            <span>Login</span>
        </div>  

        <!-- LOGIN FORM -->
        <form method="POST">
            {% csrf_token %}

            <div class="input_wrapper">
                <input type="text" name="id_number" id="user" class="input_field" required>
                <label for="user" class="label">ID Number:</label>
                <i class="fa-regular fa-user icon"></i>
            </div>

            <div class="input_wrapper">
                <input type="password" name="password" id="password" class="input_field" required>
                <label for="password" class="label">Password:</label>
                <i class="fa-solid fa-lock icon"></i>
            </div>

            <div class="remember-forgot">
                <div class="show-password">
                    <input type="checkbox" id="remember">
                    <label for="show-password">Show Password</label>
                </div>
                <div class="forgot">
                    <a href="{% url 'forgot_password' %}">Forgot password?</a>
                </div>
            </div>

            <div class="input_wrapper">
                <input type="submit" value="Login" class="input-submit">
            </div>

            {% if error %}
            <p style="color:red; text-align:center;">{{ error }}</p>
            {% endif %}
        </form>
    </div>
</div>

<script>
// ===== SHOW/HIDE PASSWORD =====
const passwordInput = document.getElementById('password');
const showPassword = document.getElementById('remember');

showPassword.addEventListener('change', function() {
    if(this.checked){
        passwordInput.type = 'text';
    } else {
        passwordInput.type = 'password';
    }
});

// ===== LABEL FLOATING =====
const inputs = document.querySelectorAll('.input_field');

inputs.forEach(input => {
    if(input.value.trim() !== '') {
        input.parentElement.classList.add('has-value');
    }

    input.addEventListener('input', function() {
        if(this.value.trim() !== '') {
            this.parentElement.classList.add('has-value');
        } else {
            this.parentElement.classList.remove('has-value');
        }
    });

    input.addEventListener('focus', function() {
        this.parentElement.classList.add('has-value');
    });

    input.addEventListener('blur', function() {
        if(this.value.trim() === '') {
            this.parentElement.classList.remove('has-value');
        }
    });
});
</script>
{% endblock %}
