{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - MIS</title>
    <link rel="stylesheet" href="{% static 'css/forgot_password.css' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <main class="card">
        <!-- Header -->
        <header class="header">
            <h1>Forgot Password</h1>
        </header>
        
        <!-- Content -->
        <div class="content">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <!-- Form -->
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>ID Number</label>
                    <div class="input-wrapper">
                        <input type="text" name="id_number" required maxlength="20" 
                               placeholder="Enter your ID Number" autocomplete="off">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" name="email" required 
                               placeholder="Enter registered email" autocomplete="email">
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Send OTP Code</button>
            </form>
        </div>
        
        <!-- Footer -->
        <footer class="footer">
            <a href="{% url 'login' %}">← Return to Login</a>
        </footer>
    </main>
</body>
</html>
