<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
    <h2 style="color: #007bff;">Password Reset OTP</h2>
    <p>Hi {{ user.first_name|default:user.email }},</p>
    <p>Your OTP for password reset is:</p>
    <h1 style="background: #007bff; color: white; padding: 20px; text-align: center; letter-spacing: 5px;">
        {{ otp }}
    </h1>
    <p><strong>This OTP expires in 5 minutes.</strong></p>
    <p>If you didn't request this, please ignore this email.</p>
    <hr>
    <p style="color: #666; font-size: 12px;">{{ domain }}</p>
</body>
</html>
